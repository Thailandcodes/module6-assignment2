name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r airbnb/requirements.txt
          python -m pip install -r covid19/requirements.txt

      - name: Show workspace
        run: |
          pwd
          ls -R

      - name: Run Airbnb tests
        run: python -m pytest airbnb/tests -v --junitxml=airbnb/pytest_report.xml

      - name: Run COVID tests
        run: python -m pytest covid19/tests -v --junitxml=covid19/pytest_report.xml